name: Price Monitor

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:  # ← Добавь, чтобы запускать вручную

jobs:
  monitor:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - run: pip install -r requirements.txt
      
      - name: Run price monitor
        env:
          EMAIL_APP_PASSWORD: ${{ secrets.EMAIL_APP_PASSWORD }}
        run: |
          echo "🚀 Запуск агента..."
          echo "EMAIL_APP_PASSWORD установлен: $([ -z '${{ secrets.EMAIL_APP_PASSWORD }}' ] && echo 'НЕТ' || echo 'ДА')"
          python price_monitor_agent.py
          echo "✅ Завершено"
      
      - name: Show logs if failed
        if: failure()
        run: cat price_monitor.log || echo "Лог не найден"
