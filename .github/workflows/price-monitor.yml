name: Price Monitor

on:
  schedule:
    - cron: '0 4 * * *'  # 7:00 по московскому времени
  workflow_dispatch: 
  
jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.9
      - name: Install dependencies
        run: pip install pandas openpyxl requests
      - name: Run price monitor
        env:
          EMAIL_APP_PASSWORD: ${{ secrets.EMAIL_APP_PASSWORD }}
        run: python price_monitor_agent.py
